name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve Docker Hub settings
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_USERNAME_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          dockerhub_username="${DOCKERHUB_USERNAME_VAR:-$DOCKERHUB_USERNAME_SECRET}"

          if [ -z "$dockerhub_username" ]; then
            dockerhub_username="${GITHUB_REPOSITORY_OWNER:-$GITHUB_ACTOR}"
          fi

          if [ -z "$dockerhub_username" ]; then
            echo "::error::Missing Docker Hub username. Set DOCKERHUB_USERNAME as a variable or secret."
            exit 1
          fi

          image_name="${DOCKERHUB_IMAGE:-$dockerhub_username/$REPOSITORY_NAME}"

          if [ -z "$image_name" ] || [[ "$image_name" != */* ]] || [[ "$image_name" == /* ]] || [[ "$image_name" == */ ]] || [[ "$image_name" == *"//"* ]]; then
            echo "::error::Invalid Docker image name '$image_name'. Use namespace/repository, for example soncoderz/bt_lop_20_3."
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret DOCKERHUB_TOKEN"
            exit 1
          fi

          {
            echo "username<<EOF"
            echo "$dockerhub_username"
            echo "EOF"
            echo "image_name<<EOF"
            echo "$image_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing image: $image_name"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
